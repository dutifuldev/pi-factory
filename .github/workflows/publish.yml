name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    # npm trusted publishing + provenance requires a GitHub-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          check-latest: true
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Validate package metadata for trusted publishing
        run: |
          node - <<'NODE'
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedName = "@dutifuldev/pi-factory";
          const expectedRepoUrl = "https://github.com/dutifuldev/pi-factory";

          const normalizeRepoUrl = (value) =>
            String(value ?? "")
              .trim()
              .replace(/^git\+/, "")
              .replace(/\.git$/i, "")
              .replace(/\/+$/, "");

          const actualRepoUrl = normalizeRepoUrl(pkg?.repository?.url);
          const expectedRepoUrlNormalized = normalizeRepoUrl(expectedRepoUrl);
          const errors = [];

          if (pkg?.name !== expectedName) {
            errors.push(`package.json name must be ${expectedName}; found ${pkg?.name ?? "<missing>"}`);
          }
          if (pkg?.private === true) {
            errors.push("package.json must not be private for npm publishing.");
          }
          if (actualRepoUrl !== expectedRepoUrlNormalized) {
            errors.push(
              `package.json repository.url must resolve to ${expectedRepoUrlNormalized}; found ${actualRepoUrl || "<missing>"}`
            );
          }
          if (pkg?.publishConfig?.access !== "public") {
            errors.push("package.json publishConfig.access must be public.");
          }
          if (pkg?.bin?.["pi-factory"] !== "dist/src/cli/main.js") {
            errors.push(
              `package.json bin.pi-factory must be dist/src/cli/main.js; found ${pkg?.bin?.["pi-factory"] ?? "<missing>"}`
            );
          }

          if (errors.length > 0) {
            for (const err of errors) {
              console.error(err);
            }
            process.exit(1);
          }

          console.log("Package metadata validated.");
          NODE
      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [ "$tag" != "v$version" ] && [ "$tag" != "$version" ]; then
            echo "Release tag $tag does not match package version $version." >&2
            exit 1
          fi
      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "@dutifuldev/pi-factory@$package_version" version 2>/dev/null || true)"

          if [ "$published_version" = "$package_version" ]; then
            echo "@dutifuldev/pi-factory@$package_version is already published on npm."
            exit 1
          fi

          echo "Publishing @dutifuldev/pi-factory@$package_version"
      - run: npm run check
      - run: npm run mutate
      - uses: dutifuldev/slophammer@main
        with:
          checker: ts
          version: 0.4.0
      - run: npm publish --access public --provenance
